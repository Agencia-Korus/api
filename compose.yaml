services:
  korus-db:
    image: postgres
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
  korus-api:
    image: korus-api
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - korus-db

volumes:
  pgdata: